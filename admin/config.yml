backend:
  name: git-gateway
  branch: main # or master, whichever your branch is named

media_folder: "assets/images" # Where your Lambo and logo images will be stored
public_folder: "/assets/images"

collections:
  - name: "projects"
    label: "Projects"
    file: "projects.json" # One file instead of many .md files
    fields:
      - name: "items"
        label: "Project List"
        widget: "list"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Category", name: "category", widget: "select", options: ["branding", "social", "logo", "motion"]}
          - {label: "Image", name: "image", widget: "image"}
          - {label: "Description", name: "description", widget: "text"}
